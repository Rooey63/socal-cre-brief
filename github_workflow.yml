name: Daily SoCal CRE Brief

on:
  schedule:
    # 6 AM PST = 2 PM UTC (accounts for PST/PDT)
    # Using UTC since GitHub Actions uses UTC
    - cron: '0 14 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  daily-brief:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 anthropic
      
      - name: Run CRE Brief Generator
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
        run: |
          python socal_cre_briefing.py
      
      - name: Update Dashboard Data
        run: |
          python update_dashboard.py
        continue-on-error: true
      
      - name: Commit and push dashboard updates
        run: |
          git config user.name "CRE Brief Bot"
          git config user.email "bot@socal-cre-brief.local"
          git add dashboard/data.json || true
          git commit -m "Update dashboard data - $(date)" || true
          git push || true
